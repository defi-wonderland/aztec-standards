name: 'Run Benchmarks'
description: 'Run Aztec benchmarks, generate diff report, and upload results'

inputs:
  pr-number:
    description: 'Pull request number'
    required: true
  base-ref:
    description: 'Base branch ref for comparison'
    required: true
  bench-dir:
    description: 'Directory for benchmark files'
    required: false
    default: './benchmarks'

runs:
  using: 'composite'
  steps:
    - name: Fetch base branch benchmark results
      shell: bash
      run: |
        echo "Fetching benchmark results from base branch: ${{ inputs.base-ref }}"
        
        # Clean up any existing _latest.benchmark.json files
        rm -f ${{ inputs.bench-dir }}/*_latest.benchmark.json
        
        # Get list of benchmark JSON files from base branch
        BASE_FILES=$(git ls-tree --name-only "origin/${{ inputs.base-ref }}" -- ${{ inputs.bench-dir }}/ 2>/dev/null | grep '_latest\.benchmark\.json$' || true)
        
        if [ -z "$BASE_FILES" ]; then
          echo "No benchmark files found in base branch. This might be the first benchmark run."
        else
          for file in $BASE_FILES; do
            filename=$(basename "$file")
            echo "Fetching $file -> ${{ inputs.bench-dir }}/$filename"
            git show "origin/${{ inputs.base-ref }}:$file" > "${{ inputs.bench-dir }}/$filename"
          done
        fi

    - name: Generate Markdown diff
      uses: defi-wonderland/aztec-benchmark/action@main
      with:
        base_suffix: '_latest'
        current_suffix: '_new'

    - name: Comment diff on PR
      uses: peter-evans/create-or-update-comment@v4
      with:
        issue-number: ${{ inputs.pr-number }}
        body-path: benchmark-comparison.md

    - name: Prepare benchmark files for upload
      shell: bash
      run: |
        # Remove old _latest files (from base branch fetch) before renaming
        rm -f ${{ inputs.bench-dir }}/*_latest.benchmark.json
        
        # Rename _new files to _latest (the canonical stored format)
        for file in ${{ inputs.bench-dir }}/*_new.benchmark.json; do
          if [ -f "$file" ]; then
            new_name="${file/_new.benchmark.json/_latest.benchmark.json}"
            echo "Renaming $file -> $new_name"
            mv "$file" "$new_name"
          fi
        done

    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results-pr-${{ inputs.pr-number }}
        path: ${{ inputs.bench-dir }}/*_latest.benchmark.json
        retention-days: 2
