name: Production Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version from package.json (e.g., 1.0.0 or 1.0.0-beta.1). Do NOT include the "v" prefix.'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ══════════════════════════════════════════════════════════════════════════════
  # PRODUCTION RELEASE JOB
  # ══════════════════════════════════════════════════════════════════════════════
  release:
    name: Release
    environment: Production
    runs-on: ubuntu-latest-m
    timeout-minutes: 60
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write  # Required to create and push tags

    env:
      PROJECT_NAME: '@defi-wonderland/aztec-standards'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Update PATH for Aztec
        run: |
          echo "$HOME/.aztec/current/bin" >> $GITHUB_PATH
          echo "$HOME/.aztec/current/node_modules/.bin" >> $GITHUB_PATH
          echo "$HOME/.aztec/bin" >> $GITHUB_PATH

      - name: Detect Aztec version
        id: aztec-version
        run: |
          VER=$(node -p "require('./package.json').config.aztecVersion")
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Aztec version: $VER"

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Cache Aztec CLI
        id: cache-aztec
        uses: actions/cache@v4
        with:
          path: /home/runner/.aztec
          key: aztec-${{ runner.os }}-${{ steps.aztec-version.outputs.version }}

      - name: Install Aztec CLI
        if: steps.cache-aztec.outputs.cache-hit != 'true'
        run: |
          INSTALL_URL="https://install.aztec.network/${{ steps.aztec-version.outputs.version }}/"
          echo "Installing from: $INSTALL_URL"
          curl -sL $INSTALL_URL > tmp.sh
          VERSION=${{ steps.aztec-version.outputs.version }} bash tmp.sh <<< yes "yes"

      - name: Switch CLI to target version
        if: steps.cache-aztec.outputs.cache-hit != 'true'
        run: aztec-up install ${{ steps.aztec-version.outputs.version }}

      - name: Install dependencies
        run: yarn --frozen-lockfile

      - name: Compile contracts
        run: aztec compile

      - name: Codegen wrappers
        run: aztec codegen target --outdir src/artifacts -f

      # TODO: Automate changing package.json version from the workflow input
      #       (e.g., open a PR or push a signed commit) so manual edits are not required.
      - name: Validate input version matches package.json
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Input version: $INPUT_VERSION"
          echo "package.json version: $PKG_VERSION"
          if [ "$INPUT_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Input version ($INPUT_VERSION) does not match package.json version ($PKG_VERSION). Update package.json or re-run with the matching version (no 'v' prefix)."
            exit 1
          fi

      - name: Build package
        run: yarn build

      - name: Setup Node.js for NPM publish
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to NPM
        run: cd export/${{ env.PROJECT_NAME }} && npm publish --access public --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release Tag (adds 'v' prefix to input)
        run: |
          TAG_NAME="v${{ github.event.inputs.version }}"
          # Check if tag already exists
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG_NAME}$"; then
            echo "::error::Tag ${TAG_NAME} already exists. Please use a different version."
            exit 1
          fi
          git tag "${TAG_NAME}"
          git push origin "${TAG_NAME}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
