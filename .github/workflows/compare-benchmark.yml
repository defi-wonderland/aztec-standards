name: Aztec Benchmark Diff

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  BENCH_DIR: ./benchmarks

jobs:
  benchmark_base:
    runs-on: ubuntu-latest-m
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "22.17.0"

      - name: Install Aztec CLI
        run: |
          curl -s https://install.aztec.network > tmp.sh
          bash tmp.sh <<< yes "yes"

      - name: Update path
        run: echo "/home/runner/.aztec/bin" >> $GITHUB_PATH

      # ── BUILD BASE ──
      - name: Checkout BASE branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Detect Aztec version (BASE)
        id: basever
        run: |
          VER=$(node -p "require('./package.json').config.aztecVersion")
          echo "ver=$VER" >> "$GITHUB_OUTPUT"

      - name: Switch CLI to BASE version
        run: |
          VERSION=${{ steps.basever.outputs.ver }} aztec-up

      # This is a temporary hack to fix a problem with v3 releases.
      - name: Manually tag the aztec version as `latest`
        run: |
          docker tag aztecprotocol/aztec:${{ steps.basever.outputs.ver }} aztecprotocol/aztec:latest

      - name: Install deps (BASE)
        run: yarn --frozen-lockfile

      - name: Compile contracts (BASE)
        run: yarn compile

      - name: Codegen wrappers (BASE)
        run: yarn codegen

      - name: Start local network (BASE, background)
        run: aztec start --local-network &

      - name: Start PXE node (BASE, background)
        run: |
          VERSION=${{ steps.basever.outputs.ver }} aztec \
            start --port 8081 --pxe --pxe.nodeUrl=http://localhost:8080/ \
            --pxe.proverEnabled false &

      - name: Benchmark (BASE)
        run: |
          npx aztec-benchmark --suffix _base --output-dir ${{ env.BENCH_DIR }}
      
      - name: Upload BASE benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks-base
          path: ${{ env.BENCH_DIR }}/*.json
          if-no-files-found: error

  benchmark_pr:
    runs-on: ubuntu-latest-m
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "22.17.0"

      - name: Install Aztec CLI
        run: |
          curl -s https://install.aztec.network > tmp.sh
          bash tmp.sh <<< yes "yes"

      - name: Update path
        run: echo "/home/runner/.aztec/bin" >> $GITHUB_PATH

      # ── BUILD PR ──
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Detect Aztec version (PR)
        id: prver
        run: |
          VER=$(node -p "require('./package.json').config.aztecVersion")
          echo "ver=$VER" >> "$GITHUB_OUTPUT"

      - name: Switch CLI to PR version
        run: |
          VERSION=${{ steps.prver.outputs.ver }} aztec-up

      # This is a temporary hack to fix a problem with v3 releases.
      - name: Manually tag the aztec version as `latest`
        run: |
          docker tag aztecprotocol/aztec:${{ steps.prver.outputs.ver }} aztecprotocol/aztec:latest

      - name: Install deps (PR)
        run: yarn --frozen-lockfile

      - name: Compile contracts (PR)
        run: yarn compile

      - name: Codegen wrappers (PR)
        run: yarn codegen

      - name: Start local network (PR, background)
        run: aztec start --local-network &

      - name: Start PXE node (PR, background)
        run: |
          VERSION=${{ steps.prver.outputs.ver }} aztec \
            start --port 8081 --pxe --pxe.nodeUrl=http://localhost:8080/ \
            --pxe.proverEnabled false &

      - name: Benchmark (PR)
        run: |
          npx aztec-benchmark --suffix _pr --output-dir ${{ env.BENCH_DIR }}
      
      - name: Upload PR benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks-pr
          path: ${{ env.BENCH_DIR }}/*.json
          if-no-files-found: error

  diff:
    needs: [benchmark_base, benchmark_pr]
    runs-on: ubuntu-latest-m
    env:
      BENCH_DIR: ./benchmarks
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Download all benchmark artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: benchmarks-*
          merge-multiple: true
          path: ${{ env.BENCH_DIR }}

      # ──────────────────────────────────────────────────────────────
      # 3️⃣  DIFF &  COMMENT
      # ──────────────────────────────────────────────────────────────
      - name: Generate Markdown diff
        uses: defi-wonderland/aztec-benchmark/action@dev
        with:
          base_suffix: '_base'
          current_suffix: '_pr'
          only_report: true

      - name: Comment diff
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-file: benchmark-comparison.md
