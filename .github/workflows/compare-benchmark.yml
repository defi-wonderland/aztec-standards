name: Aztec Benchmark Diff

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  BENCH_DIR: ./benchmarks

jobs:
  version-check:
    name: Check version compatibility
    runs-on: ubuntu-latest
    outputs:
      skip_benchmark: ${{ steps.compare.outputs.skip }}
      base_version: ${{ steps.compare.outputs.base_ver }}
      pr_version: ${{ steps.compare.outputs.pr_ver }}
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Get PR version
        id: pr
        run: echo "ver=$(node -p "require('./package.json').config.aztecVersion")" >> "$GITHUB_OUTPUT"

      - name: Checkout BASE
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Compare versions
        id: compare
        run: |
          BASE_VER=$(node -p "require('./package.json').config.aztecVersion")
          PR_VER="${{ steps.pr.outputs.ver }}"
          echo "base_ver=$BASE_VER" >> "$GITHUB_OUTPUT"
          echo "pr_ver=$PR_VER" >> "$GITHUB_OUTPUT"
          echo "Base version: $BASE_VER"
          echo "PR version: $PR_VER"
          if [ "$BASE_VER" != "$PR_VER" ]; then
            echo "Versions differ - benchmarks will be skipped"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Versions match - benchmarks will run"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  benchmark:
    needs: version-check
    if: needs.version-check.outputs.skip_benchmark != 'true'
    strategy:
      matrix:
        os: [ubuntu-latest-m]
        threads: [12]

    runs-on: 
      labels: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      # ──────────────────────────────────────────────────────────────
      # 0️⃣  SHARED TOOLING – Buildx + Aztec CLI skeleton
      # ──────────────────────────────────────────────────────────────
      - name: Checkout repo (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx (Aztec local network needs BuildKit)
        uses: docker/setup-buildx-action@v2

      - name: Detect Aztec version
        id: aztec-version
        run: |
          AZTEC_VERSION=$(node -p "require('./package.json').config.aztecVersion")
          echo "version=$AZTEC_VERSION" >> "$GITHUB_OUTPUT"
          echo "Aztec version is $version"

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install Aztec CLI
        run: |
          INSTALL_URL="https://install.aztec.network/${{ steps.aztec-version.outputs.version }}/"
          echo "Installing from: $INSTALL_URL"
          curl -sL $INSTALL_URL > tmp.sh
          VERSION=${{ steps.aztec-version.outputs.version }} bash tmp.sh <<< yes "yes"
    
      - name: Update path
        run: |
          echo "$HOME/.aztec/current/bin" >> $GITHUB_PATH
          echo "$HOME/.aztec/current/node_modules/.bin" >> $GITHUB_PATH
          echo "$HOME/.aztec/bin" >> $GITHUB_PATH

      # ──────────────────────────────────────────────────────────────
      # 1️⃣  BENCHMARK BASE COMMIT
      # ──────────────────────────────────────────────────────────────
      - name: Checkout BASE branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22.17.0"

      - name: Detect Aztec version (BASE)
        id: basever
        run: |
          VER=$(node -p "require('./package.json').config.aztecVersion")
          echo "ver=$VER" >> "$GITHUB_OUTPUT"
          echo "Base Aztec version is $VER"

      - name: Switch CLI to BASE version
        run: aztec-up install ${{ steps.basever.outputs.ver }}

      - name: Start local network (BASE, background)
        run: aztec start --local-network &

      - name: Start PXE node (BASE, background)
        run: |
          aztec \
            start --port 8081 --pxe --pxe.nodeUrl=http://localhost:8080/ \
            --pxe.proverEnabled false &

      - name: Install deps (BASE)
        run: yarn --frozen-lockfile

      - name: Compile contracts (BASE)
        run: yarn compile

      - name: Codegen wrappers (BASE)
        run: yarn codegen

      - name: Benchmark (BASE)
        run: |
          npx aztec-benchmark --suffix _base --output-dir ${{ env.BENCH_DIR }}

      # This is required to avoid the benchmark results being removed by the Checkout PR step
      - name: Store base benchmark results
        run: |
          mkdir -p ../benchmarks_base && mv ${{ env.BENCH_DIR }}/*.json ../benchmarks_base/

      # ──────────────────────────────────────────────────────────────
      # 2️⃣  BENCHMARK PR HEAD  (github.event.pull_request.head.sha)
      # ──────────────────────────────────────────────────────────────

      # clean does not work correctly and is removing the benchmark results anyways
      # https://github.com/actions/checkout/issues/1201
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          clean: false

      # Restore the base benchmark results to avoid the benchmark results being removed by the Checkout PR step
      - name: Restore base benchmark results
        run: mv ../benchmarks_base/* ${{ env.BENCH_DIR }}/

      - name: Detect Aztec version (PR)
        id: prver
        run: |
          VER=$(node -p "require('./package.json').config.aztecVersion")
          echo "PR Aztec version is $VER"
          if [ "${{ steps.basever.outputs.ver }}" != "$VER" ]; then
            echo "ver_diff=true" >> "$GITHUB_OUTPUT"
          else
            echo "ver_diff=false" >> "$GITHUB_OUTPUT"
          fi
          echo "ver=$VER" >> "$GITHUB_OUTPUT"

      - name: Kill BASE services
        if: steps.prver.outputs.ver_diff == 'true'
        run: |
          pkill -f "aztec.*--local-network" || true                   
          pkill -f "aztec.*--pxe.*8081" || true                   
          sleep 5      

      - name: Switch CLI to PR version
        if: steps.prver.outputs.ver_diff == 'true'
        run: aztec-up install ${{ steps.prver.outputs.ver }}

      - name: Start local network (PR, background)
        if: steps.prver.outputs.ver_diff == 'true'
        run: aztec start --local-network &

      - name: Start PXE node (PR, background)
        if: steps.prver.outputs.ver_diff == 'true'
        run: |
          aztec \
            start --port 8081 --pxe --pxe.nodeUrl=http://localhost:8080/ \
            --pxe.proverEnabled false &

      - name: Install deps (PR)
        run: yarn --frozen-lockfile

      - name: Compile contracts (PR)
        run: yarn compile

      - name: Codegen wrappers (PR)
        run: yarn codegen

      # ──────────────────────────────────────────────────────────────
      # 3️⃣  DIFF &  COMMENT
      # ──────────────────────────────────────────────────────────────
      - name: Generate Markdown diff
        uses: defi-wonderland/aztec-benchmark/action@chore/v4
        with:
          base_suffix: '_base'
          current_suffix: '_pr'

      - name: Comment diff
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-file: benchmark-comparison.md

  skip-comment:
    name: Post skip notice
    needs: version-check
    if: needs.version-check.outputs.skip_benchmark == 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post skip comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## Benchmark Comparison Skipped

            Benchmarks were skipped because the Aztec version changed:
            - **Base:** `${{ needs.version-check.outputs.base_version }}`
            - **PR:** `${{ needs.version-check.outputs.pr_version }}`

            This is expected during version upgrades.
