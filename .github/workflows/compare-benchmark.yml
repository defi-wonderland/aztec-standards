name: Aztec Benchmark Diff

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  BENCH_DIR: ./benchmarks

jobs:
  benchmark:
    runs-on: ubuntu-latest-m
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "22.17.0"

      - name: Set up Docker Buildx (Aztec local network needs BuildKit)
        uses: docker/setup-buildx-action@v2

      - name: Install Aztec CLI
        run: |
          curl -s https://install.aztec.network > tmp.sh
          VERSION=${{ steps.aztec-version.outputs.version }} bash tmp.sh <<< yes "yes"

      - name: Update path
        run: echo "/home/runner/.aztec/bin" >> $GITHUB_PATH

      # ── CHECKOUT PR BRANCH ──
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      # ── FETCH BASE BRANCH BENCHMARK RESULTS (no re-run) ──
      - name: Fetch base branch benchmark results
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          echo "Fetching benchmark results from base branch: $BASE_REF"
          
          # Clean up any existing _latest.benchmark.json files from previous runs
          # to ensure we only compare against actual base branch results
          rm -f ${{ env.BENCH_DIR }}/*_latest.benchmark.json
          
          # Get list of benchmark JSON files from base branch
          BASE_FILES=$(git ls-tree --name-only "origin/$BASE_REF" -- benchmarks/ 2>/dev/null | grep '_latest\.benchmark\.json$' || true)
          
          if [ -z "$BASE_FILES" ]; then
            echo "No benchmark files found in base branch. This might be the first benchmark run."
          else
            # Fetch each benchmark file from base branch (keeps _latest suffix)
            for file in $BASE_FILES; do
              filename=$(basename "$file")
              echo "Fetching $file -> benchmarks/$filename"
              git show "origin/$BASE_REF:$file" > "benchmarks/$filename"
            done
          fi

      # ── SETUP AND BUILD PR ──
      - name: Detect Aztec version (PR)
        id: prver
        run: |
          VER=$(node -p "require('./package.json').config.aztecVersion")
          echo "ver=$VER" >> "$GITHUB_OUTPUT"

      - name: Switch CLI to PR version
        run: |
          VERSION=${{ steps.prver.outputs.ver }} aztec-up

      # This is a temporary hack to fix a problem with v3 releases.
      - name: Manually tag the aztec version as `latest`
        run: |
          docker tag aztecprotocol/aztec:${{ steps.prver.outputs.ver }} aztecprotocol/aztec:latest

      - name: Install deps (PR)
        run: yarn --frozen-lockfile

      - name: Compile contracts (PR)
        run: yarn compile

      - name: Codegen wrappers (PR)
        run: yarn codegen

      - name: Start local network (PR, background)
        run: aztec start --local-network &

      - name: Start PXE node (PR, background)
        run: |
          VERSION=${{ steps.prver.outputs.ver }} aztec \
            start --port 8081 --pxe --pxe.nodeUrl=http://localhost:8080/ \
            --pxe.proverEnabled false &

      # ── RUN PR BENCHMARKS ──
      - name: Benchmark (PR)
        run: |
          npx aztec-benchmark --suffix _new --output-dir ${{ env.BENCH_DIR }}

      # ── GENERATE DIFF REPORT ──
      - name: Generate Markdown diff
        uses: defi-wonderland/aztec-benchmark/action@dev
        with:
          base_suffix: '_latest'
          current_suffix: '_new'
          only_report: true

      - name: Comment diff
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: benchmark-comparison.md

      # ── UPDATE BENCHMARK FILES AND COMMIT ──
      - name: Update benchmark files
        run: |
          # Remove old temporary files
          rm -f ${{ env.BENCH_DIR }}/*_latest.benchmark.json
          
          # Rename _new files to _latest (the canonical stored format)
          for file in ${{ env.BENCH_DIR }}/*_new.benchmark.json; do
            if [ -f "$file" ]; then
              new_name="${file/_new.benchmark.json/_latest.benchmark.json}"
              echo "Renaming $file -> $new_name"
              mv "$file" "$new_name"
            fi
          done

      - name: Commit updated benchmark results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add new/modified benchmark files
          git add ${{ env.BENCH_DIR }}/*_latest.benchmark.json 2>/dev/null || true
          
          # Stage deletions (files that were tracked but no longer exist)
          for file in $(git ls-files "${{ env.BENCH_DIR }}" | grep '_latest\.benchmark\.json$'); do
            if [ ! -f "$file" ]; then
              echo "Staging deletion of $file"
              git rm --cached "$file"
            fi
          done
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to benchmark files"
          else
            git commit -m "chore: update benchmark results [skip ci]"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi
