name: Update Benchmark Baseline

on:
  push:
    branches:
      - dev
      - main
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

concurrency:
  group: update-baseline-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  baseline:
    uses: defi-wonderland/aztec-ci-actions/.github/workflows/update-baseline.yml@v0
    secrets: inherit
