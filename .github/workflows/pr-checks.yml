name: PR Checks

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  BENCH_DIR: ./benchmarks

jobs:
  # ══════════════════════════════════════════════════════════════════════════════
  # BENCHMARK JOB
  # ══════════════════════════════════════════════════════════════════════════════
  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest-m
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup Aztec environment
        uses: ./.github/actions/setup-aztec
        with:
          start-pxe: 'true'
          run-codegen: 'true'

      - name: Run benchmarks
        uses: ./.github/actions/benchmark
        with:
          pr-number: ${{ github.event.pull_request.number }}
          base-ref: ${{ github.event.pull_request.base.ref }}
          bench-dir: ${{ env.BENCH_DIR }}

  # ══════════════════════════════════════════════════════════════════════════════
  # JS TESTS JOB
  # ══════════════════════════════════════════════════════════════════════════════
  js-tests:
    name: JS Tests
    runs-on: ubuntu-latest-m
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Aztec environment
        uses: ./.github/actions/setup-aztec
        with:
          start-pxe: 'true'
          run-codegen: 'true'

      - name: Run JS tests
        uses: ./.github/actions/js-tests

  # ══════════════════════════════════════════════════════════════════════════════
  # NOIR TESTS JOB
  # ══════════════════════════════════════════════════════════════════════════════
  noir-tests:
    name: Noir Tests
    runs-on: ubuntu-latest-m
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Aztec environment
        uses: ./.github/actions/setup-aztec
        with:
          start-pxe: 'false'
          run-codegen: 'false'

      - name: Run Noir tests
        uses: ./.github/actions/noir-tests
        with:
          threads: '12'

  # ══════════════════════════════════════════════════════════════════════════════
  # COMMIT BENCHMARK RESULTS
  # Runs only after all other jobs succeed
  # ══════════════════════════════════════════════════════════════════════════════
  commit-benchmarks:
    name: Commit Benchmarks
    needs: [benchmark, js-tests, noir-tests]
    if: success() && github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Clean old benchmark files
        run: rm -f ${{ env.BENCH_DIR }}/*_latest.benchmark.json

      - name: Download benchmark results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results-pr-${{ github.event.pull_request.number }}
          path: ${{ env.BENCH_DIR }}

      - name: Commit updated benchmark results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add new/modified benchmark files
          git add --force ${{ env.BENCH_DIR }}/*_latest.benchmark.json 2>/dev/null || true
          
          # Stage deletions (files that were tracked but no longer exist)
          for file in $(git ls-files "${{ env.BENCH_DIR }}" | grep '_latest\.benchmark\.json$'); do
            if [ ! -f "$file" ]; then
              echo "Staging deletion of $file"
              git rm --cached "$file"
            fi
          done
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to benchmark files"
          else
            git commit -m "chore: update benchmark results"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi
