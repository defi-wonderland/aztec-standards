name: PR Checks

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  checks:
    uses: defi-wonderland/aztec-ci-actions/.github/workflows/run-tests.yml@prerelease-v0.1.0 # TODO: rm `prerelease-` when aztec-ci-actions released
    secrets: inherit

  benchmark:
    uses: defi-wonderland/aztec-benchmark/.github/workflows/pr-benchmark.yml@prerelease-4.0.0-devnet.1-patch.0 # TODO: rm `prerelease-` when aztec-benchmark released
    permissions:
      pull-requests: write
      issues: write
      actions: read
    secrets: inherit
